<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Weather App</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to top right, #87ceeb, #ffffff);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .weather-app {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }
        
        input {
            width: 80%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }
        
        button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #0056b3;
        }
        
        #weatherResult {
            margin-top: 1rem;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <div class="weather-app">
        <h1>Rohit's Weather App</h1>
        <input type="text" id="locationInput" placeholder="location batawa(e.g., Dariyapur)">
        <button onclick="getWeather()">Get Weather</button>
        <div id="weatherResult"></div>
    </div>

    <script>
        function getWeather() {
            const location = document.getElementById('locationInput').value;
            const apiKey = '2f41055be2d24e7ca3a112012250709';
            const url = `http://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${encodeURIComponent(location)}&aqi=yes`;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Location galat ba ");
                    }
                    return response.json();
                })
                .then(data => {
                    const temp = data.current.temp_c;
                    const city = data.location.name;
                    const country = data.location.country;
                    document.getElementById('weatherResult').innerHTML =
                        `🌍 ${city}, ${country}<br>🌡️ Temperature: ${temp}°C`;
                })
                .catch(error => {
                    document.getElementById('weatherResult').innerHTML =
                        `❌ Error: ${error.message}`;
                });
        }
    </script>

</body>

</html>
